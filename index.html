<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>סימולציית ראיון פסיכולוג - קורס טיס</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  :root {
    --bg-primary: #0a1628;
    --bg-secondary: #122036;
    --bg-card: #1a2942;
    --border: #2a3f5f;
    --accent: #4a9eff;
    --accent-soft: #2d5a8a;
    --text-primary: #f0f4f8;
    --text-secondary: #a8b8d0;
    --text-muted: #6b7c98;
    --success: #4ade80;
    --warning: #fbbf24;
    --danger: #f87171;
    --level-1: #4ade80;
    --level-2: #fbbf24;
    --level-3: #f87171;
  }
  
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", "Arial Hebrew", "Arial", sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    line-height: 1.6;
    padding: 20px;
  }
  
  .container {
    max-width: 800px;
    margin: 0 auto;
  }
  
  .header {
    text-align: center;
    padding: 30px 20px;
    margin-bottom: 30px;
    border-bottom: 1px solid var(--border);
  }
  
  .header h1 {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 8px;
    color: var(--text-primary);
  }
  
  .header .subtitle {
    color: var(--text-secondary);
    font-size: 15px;
  }
  
  .progress-bar {
    background: var(--bg-secondary);
    border-radius: 100px;
    height: 8px;
    overflow: hidden;
    margin: 20px 0;
    border: 1px solid var(--border);
  }
  
  .progress-fill {
    background: linear-gradient(90deg, var(--accent), #6bb3ff);
    height: 100%;
    transition: width 0.5s ease;
    border-radius: 100px;
  }
  
  .level-indicator {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    font-size: 14px;
    color: var(--text-secondary);
  }
  
  .level-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 14px;
    border-radius: 100px;
    font-weight: 600;
    font-size: 13px;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
  }
  
  .level-1 .level-badge { color: var(--level-1); border-color: var(--level-1); }
  .level-2 .level-badge { color: var(--level-2); border-color: var(--level-2); }
  .level-3 .level-badge { color: var(--level-3); border-color: var(--level-3); }
  
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    margin-bottom: 20px;
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
  }
  
  .card.welcome {
    text-align: center;
  }
  
  .card.welcome h2 {
    font-size: 32px;
    margin-bottom: 16px;
    background: linear-gradient(135deg, var(--accent), #6bb3ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  
  .card.welcome p {
    color: var(--text-secondary);
    margin-bottom: 16px;
    font-size: 16px;
  }
  
  .card.welcome .features {
    text-align: right;
    background: var(--bg-secondary);
    padding: 20px;
    border-radius: 12px;
    margin: 24px 0;
  }
  
  .card.welcome .features h3 {
    color: var(--accent);
    font-size: 16px;
    margin-bottom: 12px;
  }
  
  .card.welcome .features ul {
    list-style: none;
  }
  
  .card.welcome .features li {
    padding: 6px 0;
    color: var(--text-secondary);
    font-size: 14px;
  }
  
  .card.welcome .features li::before {
    content: "◂ ";
    color: var(--accent);
    font-weight: bold;
  }
  
  .question-number {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 12px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  
  .question-text {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 24px;
    line-height: 1.5;
    color: var(--text-primary);
  }
  
  .question-context {
    background: var(--bg-secondary);
    border-right: 3px solid var(--accent);
    padding: 12px 16px;
    border-radius: 8px;
    color: var(--text-secondary);
    font-size: 14px;
    margin-bottom: 20px;
    font-style: italic;
  }
  
  textarea {
    width: 100%;
    min-height: 180px;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    color: var(--text-primary);
    font-family: inherit;
    font-size: 15px;
    line-height: 1.6;
    resize: vertical;
    transition: border-color 0.2s;
  }
  
  textarea:focus {
    outline: none;
    border-color: var(--accent);
  }
  
  textarea::placeholder {
    color: var(--text-muted);
  }
  
  .word-count {
    text-align: left;
    color: var(--text-muted);
    font-size: 12px;
    margin-top: 8px;
  }
  
  .input-mode-toggle {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    background: var(--bg-secondary);
    padding: 4px;
    border-radius: 10px;
    border: 1px solid var(--border);
  }
  
  .mode-btn {
    flex: 1;
    padding: 10px;
    background: transparent;
    color: var(--text-secondary);
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    min-width: auto;
  }
  
  .mode-btn:hover {
    background: var(--bg-card);
    transform: none;
  }
  
  .mode-btn.active {
    background: var(--accent);
    color: white;
  }
  
  .recording-area {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    text-align: center;
  }
  
  .record-btn {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    cursor: pointer;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex: none;
    min-width: auto;
    padding: 0;
  }
  
  .record-btn:hover {
    background: #6bb3ff;
    transform: scale(1.05);
  }
  
  .record-btn.recording {
    background: var(--danger);
    animation: pulse 1.5s infinite;
  }
  
  .record-btn.recording:hover {
    background: #ff8080;
  }
  
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(248, 113, 113, 0.7); }
    50% { box-shadow: 0 0 0 15px rgba(248, 113, 113, 0); }
  }
  
  .record-icon {
    width: 28px;
    height: 28px;
    background: white;
    border-radius: 50%;
  }
  
  .record-btn.recording .record-icon {
    border-radius: 4px;
    width: 24px;
    height: 24px;
  }
  
  .record-status {
    margin-top: 16px;
    color: var(--text-secondary);
    font-size: 14px;
    min-height: 22px;
  }
  
  .record-timer {
    color: var(--accent);
    font-weight: 600;
    font-family: 'Courier New', monospace;
    font-size: 16px;
    margin-top: 8px;
    min-height: 22px;
  }
  
  .record-timer.recording {
    color: var(--danger);
  }
  
  .audio-player {
    width: 100%;
    margin-top: 16px;
    border-radius: 8px;
  }
  
  .live-transcript {
    background: var(--bg-primary);
    border: 1px dashed var(--border);
    border-radius: 8px;
    padding: 14px;
    margin-top: 16px;
    min-height: 60px;
    text-align: right;
    color: var(--text-secondary);
    font-size: 14px;
    line-height: 1.6;
  }
  
  .live-transcript:empty::before {
    content: "התמלול שלך יופיע כאן בזמן הדיבור...";
    color: var(--text-muted);
    font-style: italic;
  }
  
  .live-transcript .interim {
    color: var(--text-muted);
    font-style: italic;
  }
  
  .feedback-audio {
    background: var(--bg-primary);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin: 16px 0;
  }
  
  .feedback-audio h4 {
    color: var(--text-muted);
    font-size: 12px;
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  
  .speech-tip {
    background: rgba(74, 158, 255, 0.1);
    border-right: 3px solid var(--accent);
    padding: 12px 16px;
    border-radius: 8px;
    margin-bottom: 16px;
    font-size: 13px;
    color: var(--text-secondary);
  }
  
  .speech-tip strong {
    color: var(--accent);
  }
  
  .browser-warning {
    background: rgba(251, 191, 36, 0.1);
    border: 1px solid var(--warning);
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 16px;
    color: var(--warning);
    font-size: 13px;
    text-align: center;
  }
  
  .button-row {
    display: flex;
    gap: 12px;
    margin-top: 24px;
    flex-wrap: wrap;
  }
  
  button {
    background: var(--accent);
    color: white;
    border: none;
    padding: 14px 28px;
    border-radius: 10px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    flex: 1;
    min-width: 140px;
  }
  
  button:hover {
    background: #6bb3ff;
    transform: translateY(-1px);
  }
  
  button:active {
    transform: translateY(0);
  }
  
  button.secondary {
    background: var(--bg-secondary);
    color: var(--text-primary);
    border: 1px solid var(--border);
  }
  
  button.secondary:hover {
    background: var(--bg-card);
    border-color: var(--accent);
  }
  
  button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
  }
  
  .feedback-section {
    margin-top: 24px;
  }
  
  .feedback-block {
    background: var(--bg-secondary);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
    border-right: 3px solid var(--accent);
  }
  
  .feedback-block h3 {
    color: var(--accent);
    font-size: 15px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  
  .feedback-block.warning {
    border-right-color: var(--warning);
  }
  .feedback-block.warning h3 {
    color: var(--warning);
  }
  
  .feedback-block.danger {
    border-right-color: var(--danger);
  }
  .feedback-block.danger h3 {
    color: var(--danger);
  }
  
  .feedback-block.success {
    border-right-color: var(--success);
  }
  .feedback-block.success h3 {
    color: var(--success);
  }
  
  .feedback-block p, .feedback-block li {
    color: var(--text-secondary);
    font-size: 14px;
    line-height: 1.7;
  }
  
  .feedback-block ul {
    list-style: none;
    padding-right: 0;
  }
  
  .feedback-block li {
    padding: 4px 0;
    padding-right: 18px;
    position: relative;
  }
  
  .feedback-block li::before {
    content: "◂";
    position: absolute;
    right: 0;
    color: var(--accent);
  }
  
  .feedback-block.warning li::before { color: var(--warning); }
  .feedback-block.danger li::before { color: var(--danger); }
  .feedback-block.success li::before { color: var(--success); }
  
  .self-check {
    background: var(--bg-primary);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-top: 16px;
  }
  
  .self-check h3 {
    color: var(--text-primary);
    font-size: 15px;
    margin-bottom: 12px;
  }
  
  .check-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 8px 0;
    cursor: pointer;
    color: var(--text-secondary);
    font-size: 14px;
  }
  
  .check-item input {
    margin-top: 4px;
    cursor: pointer;
    accent-color: var(--accent);
  }
  
  .level-up {
    background: linear-gradient(135deg, var(--accent-soft), var(--bg-card));
    border: 2px solid var(--accent);
    text-align: center;
    padding: 40px 32px;
  }
  
  .level-up h2 {
    color: var(--accent);
    font-size: 28px;
    margin-bottom: 16px;
  }
  
  .level-up p {
    color: var(--text-primary);
    font-size: 16px;
    margin-bottom: 12px;
  }
  
  .level-up .what-changes {
    background: var(--bg-primary);
    border-radius: 12px;
    padding: 20px;
    margin: 24px 0;
    text-align: right;
  }
  
  .level-up .what-changes h3 {
    color: var(--text-primary);
    font-size: 15px;
    margin-bottom: 10px;
  }
  
  .level-up .what-changes ul {
    list-style: none;
  }
  
  .level-up .what-changes li {
    padding: 6px 0;
    padding-right: 20px;
    position: relative;
    color: var(--text-secondary);
    font-size: 14px;
  }
  
  .level-up .what-changes li::before {
    content: "▸";
    position: absolute;
    right: 0;
    color: var(--accent);
  }
  
  .completion {
    text-align: center;
    padding: 50px 32px;
  }
  
  .completion h2 {
    font-size: 32px;
    margin-bottom: 16px;
    background: linear-gradient(135deg, var(--accent), #6bb3ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  
  .completion p {
    color: var(--text-secondary);
    font-size: 16px;
    margin-bottom: 16px;
  }
  
  .completion .stats {
    background: var(--bg-secondary);
    border-radius: 12px;
    padding: 24px;
    margin: 24px 0;
  }
  
  .stat-row {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    color: var(--text-secondary);
    font-size: 14px;
  }
  
  .stat-row:last-child {
    border-bottom: none;
  }
  
  .stat-row strong {
    color: var(--text-primary);
  }
  
  .your-answer {
    background: var(--bg-primary);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin: 16px 0;
  }
  
  .your-answer h4 {
    color: var(--text-muted);
    font-size: 12px;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  
  .your-answer p {
    color: var(--text-secondary);
    font-size: 14px;
    white-space: pre-wrap;
  }
  
  .timer {
    display: inline-block;
    padding: 4px 10px;
    background: var(--bg-secondary);
    border-radius: 6px;
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 12px;
  }
  
  .timer.urgent {
    color: var(--danger);
    border: 1px solid var(--danger);
  }
  
  @media (max-width: 600px) {
    body { padding: 12px; }
    .card { padding: 20px; }
    .question-text { font-size: 18px; }
    .header h1 { font-size: 22px; }
    .button-row { flex-direction: column; }
    button { width: 100%; }
  }
</style>
</head>
<body>
  <div class="container" id="app"></div>

<script>
// ============================================
// QUESTION DATABASE
// ============================================

const questionData = {
  level1: {
    name: "רמה 1 - היכרות",
    description: "שאלות פתיחה קלאסיות. המטרה: להתרגל לפורמט, לתרגל סיפור עצמי.",
    questions: [
      {
        q: "ספרי לי קצת על עצמך.",
        context: "זו השאלה הראשונה כמעט בכל ראיון. אל תזלזלי בה - היא מעצבת את הרושם הראשוני.",
        evaluating: "הפסיכולוגית בודקת כאן את היכולת שלך להציג את עצמך בבהירות, מה את בוחרת להדגיש (וזה אומר עלייך הרבה), עד כמה את חופשייה מול עצמך, וכיצד את מארגנת את הסיפור האישי שלך.",
        pitfalls: [
          "להקריא רשימת קורות חיים יבשה (גיל, יישוב, ציונים, פעילויות)",
          "להישמע מתורגלת מדי - כאילו שיננת תשובה",
          "לדבר יותר מדי או פחות מדי (אופטימלי: 90 שניות עד 2 דקות)",
          "להתחיל ב'אז... אהמ... מה לספר?'"
        ],
        dos: [
          "לפתוח במשפט אחד שמסכם מי את (לא מה עשית)",
          "להזכיר 2-3 דברים שמייצגים אותך באמת - תחום עניין, ערך, חוויה מעצבת",
          "לסיים בקישור למה שהוביל אותך לשאיפה לקורס טיס",
          "לדבר בקצב טבעי ולהביט בעיניים"
        ],
        selfCheck: [
          "האם התשובה שלי נשמעה אותנטית או מתורגלת?",
          "האם הזכרתי דברים שמייחדים אותי, או דברים גנריים?",
          "האם הצלחתי לסיים בנקודה ברורה במקום להישמע כמתפזרת?"
        ]
      },
      {
        q: "למה את רוצה להיות טייסת בחיל האוויר?",
        context: "זו השאלה הקריטית ביותר. תשובה חלשה כאן יכולה להפיל את כל הראיון.",
        evaluating: "הפסיכולוגית מחפשת מוטיבציה פנימית אמיתית, ולא חיצונית. היא רוצה לראות שחשבת על זה לעומק, שאת מודעת למשמעות של 10 שנים, ושיש לך סיפור אישי שמוביל לכאן - לא רק סיסמאות.",
        pitfalls: [
          "תשובות גנריות: 'רוצה לתרום למדינה', 'תמיד חלמתי על זה'",
          "להתמקד ביוקרה, בכבוד, או ב'להיות הכי טובה'",
          "התלהבות מזויפת ומופרזת",
          "לא להזכיר את האתגרים והמחיר האישי"
        ],
        dos: [
          "לחבר לסיפור אישי קונקרטי - מתי זה התחיל, איזה רגע הצית את זה",
          "להזכיר את ההבנה שלך לגבי 3 שנות הקורס + 7 שנות הקבע",
          "לדבר על מה שמושך אותך בתפקיד עצמו, לא בתואר",
          "להראות מודעות לאחריות ולשליחות, בלי דרמה"
        ],
        selfCheck: [
          "האם מישהי אחרת יכלה לתת בדיוק את אותה תשובה?",
          "האם הזכרתי את המחויבות לעשור הקרוב?",
          "האם דיברתי על התפקיד או על התואר?"
        ]
      },
      {
        q: "ספרי לי על המשפחה שלך.",
        context: "השאלה הזו מיועדת לבחון את הסביבה שלך, יחסים בתוך הבית, ויכולת התמיכה של המשפחה.",
        evaluating: "הפסיכולוגית מעריכה את היציבות המשפחתית שלך, את האופן שבו את מדברת על אנשים קרובים, ואת הדינמיקה הכללית בבית. זה גם בודק את היכולת שלך לדבר על אנשים בכבוד ובמאוזנות.",
        pitfalls: [
          "לבקר את המשפחה או להישמע ממורמרת",
          "לתאר משפחה 'מושלמת' באופן שנשמע מזויף",
          "להיכנס למורכבויות רגשיות עמוקות שלא מתאימות לראיון",
          "לתאר רק עובדות יבשות בלי שום צבע"
        ],
        dos: [

        </div>
        
        <div class="input-mode-toggle">
          <button class="mode-btn ${state.inputMode === 'voice' ? 'active' : ''}" onclick="setInputMode('voice')">קולי (מומלץ)</button>
          <button class="mode-btn ${state.inputMode === 'text' ? 'active' : ''}" onclick="setInputMode('text')">בכתב</button>
        </div>
        
        <div id="voiceMode" style="display: ${state.inputMode === 'voice' ? 'block' : 'none'}">
          <div class="recording-area">
            <button class="record-btn" id="recordBtn" onclick="toggleRecording()">
              <div class="record-icon"></div>
            </button>
            <div class="record-status" id="recordStatus">לחצי על הכפתור כדי להתחיל להקליט</div>
            <div class="record-timer" id="recordTimer"></div>
            <audio id="audioPlayer" class="audio-player" controls style="display: none;"></audio>
          </div>
          
          ${hasSpeechRecognition && !isFileProtocol ? `
            <div style="margin-top: 16px;">
              <div id="transcriptStatus" style="font-size: 12px; color: var(--text-muted); margin-bottom: 6px; min-height: 16px;"></div>
              <div class="live-transcript" id="liveTranscript"></div>
            </div>
          ` : ''}
          
          ${isFileProtocol ? `
            <div style="margin-top: 16px;">
              <div class="live-transcript">תמלול אוטומטי לא זמין במצב הנוכחי. אם תרצי להפעיל אותו, ראי את ההוראות בתחתית הדף.</div>
            </div>
          ` : ''}
        </div>
        
        <div id="textMode" style="display: ${state.inputMode === 'text' ? 'block' : 'none'}">
          <textarea 
            id="answer" 
            placeholder="כתבי כאן את התשובה שלך... זכרי - בראיון אמיתי תצטרכי לענות בדיבור. נסי לכתוב כפי שהיית אומרת בקול."
            oninput="updateWordCount()"
          ></textarea>
          <div class="word-count" id="wordCount">0 מילים</div>
        </div>
        
        <div class="button-row">
          <button onclick="submitAnswer()">סיימתי - הראי לי משוב</button>
        </div>
        
        ${isFileProtocol ? `
          <div style="margin-top: 24px; padding: 16px; background: var(--bg-secondary); border-radius: 12px; border: 1px solid var(--border); font-size: 13px; color: var(--text-secondary); line-height: 1.7;">
            <strong style="color: var(--accent);">איך להפעיל תמלול אוטומטי:</strong><br><br>
            התמלול האוטומטי דורש שהקובץ ייטען דרך שרת מקומי, ולא בלחיצה כפולה על הקובץ. זאת דרישת אבטחה של כרום. אם התמלול לא חיוני - אפשר פשוט להמשיך עם ההקלטה בלעדיו, או לעבור למצב "בכתב". אם כן רוצים להפעיל אותו - הדרך הקלה ביותר:<br><br>
            <strong>אפשרות 1 - העלאה לאינטרנט:</strong> להעלות את הקובץ לשירות חינמי כמו <a href="https://app.netlify.com/drop" target="_blank" style="color: var(--accent);">Netlify Drop</a> (גוררים את הקובץ לדף, מקבלים לינק) ולפתוח דרך הלינק.<br><br>
            <strong>אפשרות 2 - שרת מקומי בפייתון</strong> (אם פייתון מותקן):<br>
            1. פתחי <strong>שורת פקודה (cmd)</strong> בתיקייה של הקובץ<br>
            2. הקלידי: <code style="background: var(--bg-primary); padding: 2px 6px; border-radius: 4px;">python -m http.server 8000</code><br>
            3. פתחי בכרום: <code style="background: var(--bg-primary); padding: 2px 6px; border-radius: 4px;">http://localhost:8000</code><br>
            4. לחצי על שם הקובץ
          </div>
        ` : ''}
      </div>
    </div>
  `;
  
  if (state.inputMode === 'voice' && hasSpeechRecognition && !isFileProtocol) {
    setupSpeechRecognition();
  }
}

function renderFeedback() {
  const level = questionData['level' + state.currentLevel];
  const question = level.questions[state.currentQuestionIndex];
  const userAnswer = state.answers['level' + state.currentLevel][state.currentQuestionIndex] || '';
  const audioBlob = state.audioRecordings['level' + state.currentLevel][state.currentQuestionIndex];
  const totalQuestions = level.questions.length;
  const isLastInLevel = state.currentQuestionIndex === totalQuestions - 1;
  const isLastLevel = state.currentLevel === 3;
  
  let nextButtonText = 'לשאלה הבאה';
  if (isLastInLevel && isLastLevel) nextButtonText = 'לסיכום הסימולציה';
  else if (isLastInLevel) nextButtonText = 'לרמה הבאה';
  
  const speechSelfCheck = [
    "האם דיברתי בקצב טבעי, לא מהר מדי ולא לאט מדי?",
    "כמה פעמים אמרתי 'אהמ', 'אהה', או 'כאילו'?",
    "האם הטון שלי נשמע בטוח, או מתנצל ולא בטוח?",
    "האם היו רגעים של שקט שבהם פשוט קפאתי?"
  ];
  
  app.innerHTML = `
    <div class="container level-${state.currentLevel}">
      <div class="header">
        <h1>משוב על התשובה שלך</h1>
        <div class="level-indicator">
          <span class="level-badge">${level.name}</span>
          <span>שאלה ${state.currentQuestionIndex + 1} מתוך ${totalQuestions}</span>
        </div>
      </div>
      
      <div class="card">
        <div class="question-number">השאלה הייתה</div>
        <div class="question-text">${question.q}</div>
        
        ${audioBlob ? `
          <div class="feedback-audio">
            <h4>ההקלטה שלך - האזיני בקפידה</h4>
            <audio controls class="audio-player" src="${URL.createObjectURL(audioBlob)}"></audio>
          </div>
        ` : ''}
        
        ${userAnswer ? `
          <div class="your-answer">
            <h4>${audioBlob ? 'תמלול התשובה שלך' : 'התשובה שלך'}</h4>
            <p>${userAnswer}</p>
          </div>
        ` : ''}
        
        <div class="feedback-section">
          <div class="feedback-block">
            <h3>מה הפסיכולוגית באמת בודקת בשאלה הזו</h3>
            <p>${question.evaluating}</p>
          </div>
          
          <div class="feedback-block danger">
            <h3>מלכודות נפוצות (מה לא לעשות)</h3>
            <ul>
              ${question.pitfalls.map(p => `<li>${p}</li>`).join('')}
            </ul>
          </div>
          
          <div class="feedback-block success">
            <h3>מה כן לעשות</h3>
            <ul>
              ${question.dos.map(d => `<li>${d}</li>`).join('')}
            </ul>
          </div>
          
          <div class="self-check">
            <h3>בדיקה עצמית - שאלי את עצמך:</h3>
            ${question.selfCheck.map((s, i) => `
              <label class="check-item">
                <input type="checkbox" id="check-${i}">
                <span>${s}</span>
              </label>
            `).join('')}
          </div>
          
          ${audioBlob ? `
            <div class="self-check" style="margin-top: 12px;">
              <h3>בדיקת היבטי דיבור - תוך כדי האזנה להקלטה:</h3>
              ${speechSelfCheck.map((s, i) => `
                <label class="check-item">
                  <input type="checkbox" id="speech-check-${i}">
                  <span>${s}</span>
                </label>
              `).join('')}
            </div>
          ` : ''}
        </div>
        
        <div class="button-row">
          <button class="secondary" onclick="retryQuestion()">לנסות שוב</button>
          <button onclick="nextQuestion()">${nextButtonText}</button>
        </div>
      </div>
    </div>
  `;
}

function renderCompletion() {
  const totalAnswered = state.answers.level1.length + state.answers.level2.length + state.answers.level3.length;
  const totalWords = [...state.answers.level1, ...state.answers.level2, ...state.answers.level3]
    .reduce((sum, a) => sum + (a ? a.split(/\s+/).filter(w => w).length : 0), 0);
  
  app.innerHTML = `
    <div class="container">
      <div class="card completion">
        <h2>סיימת את הסימולציה</h2>
        <p>עברת את כל שלוש הרמות. זו הצלחה משמעותית.</p>
        
        <div class="stats">
          <div class="stat-row">
            <span>שאלות שענית עליהן</span>
            <strong>${totalAnswered} / 23</strong>
          </div>
          <div class="stat-row">
            <span>סך הכל מילים שכתבת</span>
            <strong>${totalWords}</strong>
          </div>
          <div class="stat-row">
            <span>רמות שעברת</span>
            <strong>3 / 3</strong>
          </div>
        </div>
        
        <div class="feedback-block">
          <h3>שלוש תובנות חשובות לקראת הראיון האמיתי</h3>
          <ul>
            <li>עקביות חשובה יותר ממוטיבציה. הפסיכולוגית בודקת אם העולם הפנימי שלך קוהרנטי</li>
            <li>הראיון פועל לפי לוגיקת סינון - הימנעי מלתת סיבות לפסילה, יותר מאשר לנסות לאסוף סיבות לקבלה</li>
            <li>אותנטיות מנצחת. הפסיכולוגית מאומנת לזהות הצגה - והאסטרטגיה הכי טובה היא להיות עצמך</li>
          </ul>
        </div>
        
        <div class="feedback-block warning">
          <h3>המלצה אחרונה</h3>
          <p>אל תעשי את הסימולציה הזו רק פעם אחת. תחזרי אליה אחרי כמה ימים, ותראי איך התשובות שלך משתנות. אם הן זהות לחלוטין - את אולי משננת ולא מתרגלת. אם הן השתפרו - את לומדת. ברגע שזה מרגיש לך טבעי לחלוטין, את מוכנה.</p>
        </div>
        
        <div class="button-row">
          <button onclick="restart()">להתחיל מההתחלה</button>
        </div>
      </div>
    </div>
  `;
}

// ============================================
// EVENT HANDLERS
// ============================================

function setInputMode(mode) {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    stopRecording();
  }
  state.inputMode = mode;
  render();
}

function setupSpeechRecognition() {
  if (recognition) return;
  
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    console.warn('SpeechRecognition API not available');
    return;
  }
  
  try {
    recognition = new SpeechRecognition();
    recognition.lang = 'he-IL';
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.maxAlternatives = 1;
    
    recognition.onstart = () => {
      console.log('Speech recognition started');
      const status = document.getElementById('transcriptStatus');
      if (status) {
        status.textContent = 'מאזין... דברי בעברית';
        status.style.color = 'var(--success)';
      }
    };
    
    recognition.onresult = (event) => {
      let interim = '';
      let final = '';
      for (let i = event.resultIndex; i < event.results.length; i++) {
        const transcript = event.results[i][0].transcript;
        if (event.results[i].isFinal) {
          final += transcript + ' ';
        } else {
          interim += transcript;
        }
      }
      if (final) {
        currentTranscript += final;
      }
      interimTranscript = interim;
      updateLiveTranscript();
    };
    
    recognition.onerror = (event) => {
      console.error('Speech recognition error:', event.error, event);
      const status = document.getElementById('transcriptStatus');
      if (!status) return;
      
      if (event.error === 'no-speech') {
        status.textContent = 'לא זוהה דיבור - נסי לדבר ברור יותר';
        status.style.color = 'var(--warning)';
      } else if (event.error === 'audio-capture') {
        status.textContent = 'בעיה בגישה למיקרופון';
        status.style.color = 'var(--danger)';
      } else if (event.error === 'not-allowed') {
        status.textContent = 'גישה למיקרופון נדחתה - אשרי בהגדרות הדפדפן';
        status.style.color = 'var(--danger)';
      } else if (event.error === 'network') {
        status.textContent = 'שגיאת רשת - תמלול דורש חיבור אינטרנט וטעינה דרך שרת (לא file://)';
        status.style.color = 'var(--danger)';
      } else if (event.error === 'service-not-allowed') {
        status.textContent = 'שירות התמלול לא זמין - יש להריץ את הקובץ דרך שרת מקומי';
        status.style.color = 'var(--danger)';
      } else if (event.error === 'aborted') {
        // Normal when stopping
      } else {
        status.textContent = 'שגיאה: ' + event.error;
        status.style.color = 'var(--danger)';
      }
    };
    
    recognition.onend = () => {
      console.log('Speech recognition ended');
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        try {
          recognition.start();
          console.log('Speech recognition restarted');
        } catch (e) {
          console.error('Failed to restart recognition:', e);
        }
      }
    };
    
    console.log('Speech recognition initialized successfully');
  } catch (e) {
    console.error('Failed to initialize speech recognition:', e);
    recognition = null;
  }
}

function updateLiveTranscript() {
  const el = document.getElementById('liveTranscript');
  if (el) {
    el.innerHTML = currentTranscript + '<span class="interim">' + interimTranscript + '</span>';
  }
}

async function toggleRecording() {
  if (!mediaRecorder || mediaRecorder.state === 'inactive') {
    await startRecording();
  } else {
    stopRecording();
  }
}

async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioChunks = [];
    currentTranscript = '';
    interimTranscript = '';
    currentAudioBlob = null;
    
    mediaRecorder = new MediaRecorder(stream);
    
    mediaRecorder.ondataavailable = (e) => {
      audioChunks.push(e.data);
    };
    
    mediaRecorder.onstop = () => {
      currentAudioBlob = new Blob(audioChunks, { type: 'audio/webm' });
      const audioUrl = URL.createObjectURL(currentAudioBlob);
      const player = document.getElementById('audioPlayer');
      if (player) {
        player.src = audioUrl;
        player.style.display = 'block';
      }
      stream.getTracks().forEach(track => track.stop());
    };
    
    mediaRecorder.start();
    recordingStartTime = Date.now();
    
    const btn = document.getElementById('recordBtn');
    const status = document.getElementById('recordStatus');
    const timer = document.getElementById('recordTimer');
    if (btn) btn.classList.add('recording');
    if (status) status.textContent = 'מקליט... לחצי שוב לעצירה';
    if (timer) timer.classList.add('recording');
    
    timerInterval = setInterval(updateTimer, 100);
    
    if (recognition) {
      try {
        recognition.start();
      } catch (e) {
        console.log('Recognition start error:', e);
      }
    }
    
    const player = document.getElementById('audioPlayer');
    if (player) player.style.display = 'none';
    
    const transcriptEl = document.getElementById('liveTranscript');
    if (transcriptEl) transcriptEl.innerHTML = '';
    
  } catch (err) {
    alert('לא ניתן לגשת למיקרופון. אנא אשרי גישה למיקרופון בהגדרות הדפדפן ונסי שוב.');
    console.error('Microphone error:', err);
  }
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
  }
  if (recognition) {
    try {
      recognition.stop();
    } catch (e) {}
  }
  if (timerInterval) {
    clearInterval(timerInterval);
    timerInterval = null;
  }
  
  const btn = document.getElementById('recordBtn');
  const status = document.getElementById('recordStatus');
  const timer = document.getElementById('recordTimer');
  if (btn) btn.classList.remove('recording');
  if (status) status.textContent = 'ההקלטה הסתיימה. האזיני להקלטה למטה, או לחצי על הכפתור להקליט מחדש.';
  if (timer) timer.classList.remove('recording');
}

function updateTimer() {
  const elapsed = Math.floor((Date.now() - recordingStartTime) / 1000);
  const minutes = Math.floor(elapsed / 60);
  const seconds = elapsed % 60;
  const timer = document.getElementById('recordTimer');
  if (timer) {
    timer.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
  }
}

function startLevel(level) {
  state.currentLevel = level;
  state.currentQuestionIndex = 0;
  state.screen = 'levelIntro';
  render();
}

function beginQuestions() {
  state.screen = 'question';
  render();
}

function submitAnswer() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    stopRecording();
  }
  
  let answer = '';
  if (state.inputMode === 'text') {
    const textarea = document.getElementById('answer');
    answer = textarea ? textarea.value.trim() : '';
  } else {
    answer = currentTranscript.trim();
  }
  
  state.answers['level' + state.currentLevel][state.currentQuestionIndex] = answer;
  state.audioRecordings['level' + state.currentLevel][state.currentQuestionIndex] = currentAudioBlob;
  
  currentAudioBlob = null;
  currentTranscript = '';
  interimTranscript = '';
  
  state.screen = 'feedback';
  render();
}

function retryQuestion() {
  currentAudioBlob = null;
  currentTranscript = '';
  interimTranscript = '';
  state.screen = 'question';
  render();
}

function nextQuestion() {
  currentAudioBlob = null;
  currentTranscript = '';
  interimTranscript = '';
  
  const level = questionData['level' + state.currentLevel];
  const isLastInLevel = state.currentQuestionIndex === level.questions.length - 1;
  
  if (isLastInLevel) {
    if (state.currentLevel === 3) {
      state.screen = 'completion';
    } else {
      state.currentLevel += 1;
      state.currentQuestionIndex = 0;
      state.screen = 'levelIntro';
    }
  } else {
    state.currentQuestionIndex += 1;
    state.screen = 'question';
  }
  render();
}

function restart() {
  state = {
    screen: 'welcome',
    currentLevel: 1,
    currentQuestionIndex: 0,
    answers: { level1: [], level2: [], level3: [] },
    audioRecordings: { level1: [], level2: [], level3: [] },
    inputMode: 'voice'
  };
  currentAudioBlob = null;
  currentTranscript = '';
  interimTranscript = '';
  render();
}

function updateWordCount() {
  const text = document.getElementById('answer').value;
  const wordCount = text.trim().split(/\s+/).filter(w => w).length;
  document.getElementById('wordCount').textContent = wordCount + ' מילים';
}

// Initialize
render();
</script>
